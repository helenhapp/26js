<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern JS Canvas Animation</title>
    <style>
      /* A little CSS to center the canvas and make it look clean */
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f9;
      }
      canvas {
        background-color: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="500" height="500"></canvas>

    <script>
      // 1. Using 'const' instead of 'var' for values that won't be reassigned
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;

      // Arrow function for drawing the circle
      const drawCircle = (x, y, radius, fillCircle, color) => {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2, false);
        ctx.fillStyle = color;
        if (fillCircle) {
          ctx.fill();
        } else {
          ctx.stroke();
        }
      };

      // 2. Using modern ES6 Class syntax instead of constructor functions + prototypes
      class Ball {
        constructor() {
          this.x = width / 2;
          this.y = height / 2;
          this.xSpeed = 5;
          this.ySpeed = 0;
          this.radius = 10;
          this.color = "black";
          this.speed = 5;
        }

        move() {
          this.x += this.xSpeed;
          this.y += this.ySpeed;

          if (this.x - this.radius < 0 || this.x + this.radius > width) {
            this.xSpeed = -this.xSpeed;
          }

          if (this.y - this.radius < 0 || this.y + this.radius > height) {
            this.ySpeed = -this.ySpeed;
          }
        }

        draw() {
          drawCircle(this.x, this.y, this.radius, true, this.color);
        }

        setDirection(direction) {
          if (direction === "up") {
            this.xSpeed = 0;
            this.ySpeed = -this.speed;
          } else if (direction === "down") {
            this.xSpeed = 0;
            this.ySpeed = this.speed;
          } else if (direction === "left") {
            this.xSpeed = -this.speed;
            this.ySpeed = 0;
          } else if (direction === "right") {
            this.xSpeed = this.speed;
            this.ySpeed = 0;
          } else if (direction === "stop") {
            this.xSpeed = 0;
            this.ySpeed = 0;
          }
        }

        changeSize(change) {
          this.radius += change;
          if (this.radius < 5) this.radius = 5;
        }

        changeSpeed(change) {
          this.speed += change;
          if (this.speed < 1) this.speed = 1;

          if (this.xSpeed !== 0) {
            this.xSpeed = this.xSpeed > 0 ? this.speed : -this.speed;
          }
          if (this.ySpeed !== 0) {
            this.ySpeed = this.ySpeed > 0 ? this.speed : -this.speed;
          }
        }
      }

      const ball = new Ball();

      // 3. Replaced deprecated 'keyCode' numbers with modern 'event.key' strings
      const keyActions = {
        " ": "stop", // Spacebar
        ArrowLeft: "left",
        ArrowUp: "up",
        ArrowRight: "right",
        ArrowDown: "down",
        z: "slowDown",
        x: "speedUp",
        c: "decreaseSize",
        v: "increaseSize",
      };

      // 4. Removed jQuery, using Vanilla JS addEventListener
      document.addEventListener("keydown", (event) => {
        // Convert to lowercase just in case Caps Lock is on for letter keys
        const key =
          event.key.length === 1 ? event.key.toLowerCase() : event.key;
        const action = keyActions[key];

        if (!action) return; // Ignore keys we haven't mapped

        if (action === "slowDown") {
          ball.changeSpeed(-1);
        } else if (action === "speedUp") {
          ball.changeSpeed(1);
        } else if (action === "decreaseSize") {
          ball.changeSize(-1);
        } else if (action === "increaseSize") {
          ball.changeSize(1);
        } else {
          ball.setDirection(action);
        }
      });

      // 5. Using requestAnimationFrame instead of setInterval
      function animate() {
        ctx.clearRect(0, 0, width, height);

        ball.draw();
        ball.move();

        ctx.strokeRect(0, 0, width, height);

        requestAnimationFrame(animate); // Recursively calls itself synced with the monitor refresh rate
      }

      // Start the engine
      animate();
    </script>
  </body>
</html>
